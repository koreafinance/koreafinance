<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>대한재무대부중개</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: 'Noto Sans KR', sans-serif;
      background: #f5f7fa;
      color: #222;
      text-align: center;
    }
    .container {
      padding: 60px 20px;
    }
    h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }
    p {
      font-size: 16px;
      line-height: 1.6;
      color: #555;
    }
    .card {
      background: white;
      margin: 40px auto;
      padding: 30px;
      max-width: 400px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }
    .name {
      font-size: 20px;
      font-weight: bold;
      margin-top: 10px;
    }
    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 24px;
      background: #2c3e50;
      color: white;
      border-radius: 8px;
      text-decoration: none;
    }
    .btn:hover {
      background: #1a252f;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>대한재무대부중개</h1>
    <p>
      신뢰를 바탕으로 고객 맞춤 금융 솔루션을 제공합니다.<br>
      복잡한 금융, 더 쉽고 명확하게 안내해드립니다.
    </p>

    <div class="card">
      <div>전문 상담</div>
      <div class="name">박요셉</div>
      <p>
        고객 상황에 맞는 최적의 금융 방향을<br>
        책임감 있게 안내해드립니다.
      </p>
      <a class="btn" href="tel:010-0000-0000">상담 문의</a>
    </div>
  </div>
</body>
</html>

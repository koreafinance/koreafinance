<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>대한재무대부중개</title>

<style>
body {margin:0;font-family:Arial;background:#f4f6f9;}
header {
  background:#1a2a44;
  color:white;
  text-align:center;
  padding:20px;
}
section {
  padding:40px;
  text-align:center;
}
.box {
  background:white;
  padding:20px;
  margin:20px auto;
  width:320px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
}
button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:5px;
  color:white;
  font-size:15px;
  cursor:pointer;
}
.kakao {background:#FEE500;color:#000;}
.phone {background:#007bff;}
.send {background:#28a745;}
input, textarea {
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:5px;
  border:1px solid #ccc;
}
</style>

</head>
<body>

<header>
  <h1>대한재무대부중개</h1>
  <p>상담사: 박요셉</p>
</header>

<section>

<div class="box">
  <h3>빠른 상담</h3>

  <button class="kakao"
  onclick="window.location.href='https://open.kakao.com/o/gKoreg00'">
  카카오톡 상담하기
  </button>

  <button class="phone"
  onclick="window.location.href='tel:01075162183'">
  전화 상담하기
  </button>
</div>

<div class="box">
  <h3>문의 신청 (비로그인 가능)</h3>

  <input type="text" placeholder="이름">
  <input type="text" placeholder="연락처">
  <textarea rows="4" placeholder="문의내용 (예: 대출 가능 여부, 한도 문의 등)"></textarea>

  <button class="send" onclick="alert('문의가 접수되었습니다. 카카오톡 또는 전화로 연락드립니다.')">
  문의하기
  </button>

  <p style="font-size:12px;color:gray;margin-top:10px;">
  ※ 실제 저장 기능은 구글폼 연결로 구현 가능합니다
  </p>
</div>

</section>

</body>
</html>

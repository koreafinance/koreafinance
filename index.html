<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>코리아파이낸스</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f6f9;
    }
    header {
      background: #1a2a44;
      color: white;
      padding: 20px;
      text-align: center;
    }
    section {
      padding: 40px;
      text-align: center;
    }
    .box {
      background: white;
      margin: 20px auto;
      padding: 20px;
      width: 300px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    footer {
      background: #1a2a44;
      color: white;
      text-align: center;
      padding: 10px;
    }
    button {
      background: #007bff;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
    }
  </style>
</head>
<body>

<header>
  <h1>코리아파이낸스</h1>
  <p>빠르고 안전한 금융 상담</p>
</header>

<section>
  <h2>서비스 안내</h2>

  <div class="box">
    <h3>대출 상담</h3>
    <p>개인 맞춤 금융 상담 제공</p>
  </div>

  <div class="box">
    <h3>신용 컨설팅</h3>
    <p>신용 점수 개선 전략 안내</p>
  </div>

  <div class="box">
    <h3>무료 상담 신청</h3>
    <p>지금 바로 문의하세요</p>
    <button onclick="alert('전화 또는 카카오톡 문의 부탁드립니다!')">상담 신청</button>
  </div>

</section>

<footer>
  <p>© 2026 코리아파이낸스 | koreafinance.co.kr</p>
</footer>

</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>대한재무대부중개</title>

<style>
body {margin:0;font-family:Arial;background:#f4f6f9;}
header {
  background: linear-gradient(135deg,#1a2a44,#243b55);
  color:white;
  text-align:center;
  padding:25px;
}
header h1 {
  margin:0;
  font-size:26px;
}
header p {
  margin-top:8px;
  font-size:14px;
  opacity:0.9;
}

section {
  padding:30px;
  text-align:center;
}

.banner {
  background:white;
  padding:25px;
  margin:20px auto;
  width:90%;
  max-width:420px;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.highlight {
  color:#007bff;
  font-weight:bold;
}

button {
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  color:white;
  font-size:15px;
  cursor:pointer;
}

.kakao {background:#FEE500;color:#000;font-weight:bold;}
.phone {background:#007bff;}
.send {background:#28a745;}

input, textarea {
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:6px;
  border:1px solid #ccc;
}

.small {
  font-size:12px;
  color:gray;
  margin-top:10px;
}
</style>

</head>
<body>

<header>
  <h1>대한재무대부중개</h1>
  <p>상담사: 박요셉</p>
</header>

<section>

<div class="banner">
  <h2>🔥 승인 가능성 빠른 무료 상담</h2>
  <p class="highlight">
    직장인 / 무직자 / 연체자 가능 여부 즉시 확인
  </p>
  <p>
    1:1 맞춤 상담으로 가능한 한도 빠르게 안내드립니다
  </p>

  <button class="kakao"
  onclick="window.location.href='https://open.kakao.com/o/slZX8lqi'">
  카카오톡으로 1분 상담받기
  </button>

  <button class="phone"
  onclick="window.location.href='tel:01075162183'">
  전화 바로 상담하기
  </button>
</div>

<div class="banner">
  <h3>📩 간편 문의 (비로그인 가능)</h3>

  <input type="text" placeholder="이름">
  <input type="text" placeholder="연락처">
  <textarea rows="4" placeholder="예: 직장인 / 무직 / 신용 상태 / 필요한 금액"></textarea>

  <button class="send" onclick="alert('문의가 접수되었습니다. 빠르게 연락드립니다.')">
  문의하기
  </button>

  <p class="small">
    ※ 실제 저장 기능은 구글폼 연결 시 자동 관리 가능합니다
  </p>
</div>

</section>

</body>
</html>
